<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            margin: 0;
        }

        .btn {
            position: relative;
            padding: 20px 50px;
            background: #111;
            color: #fff;
            font-size: 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: sans-serif;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(45deg, #00ff88, #ff00ff, #00ffff, #00ff88);
            background-size: 400%;
            border-radius: 15px;
            z-index: -1;
            animation: gradient 8s linear infinite;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #111;
            border-radius: 12px;
            margin: 3px;
            z-index: -1;
            transition: margin 0.3s;
        }

        .btn:hover::after {
            margin: 0;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <button class="btn">Hover Me</button>

</body>
</html>
