<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip Card - CodingLab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Flip Card Container */
        .flip-card {
            background-color: transparent;
            width: 350px;
            height: 500px;
            perspective: 1000px; /* Creates 3D space */
            cursor: pointer;
            border-color: #2dd4bf;
            border-width: 2px;
            border-style: solid;
            border-radius: 20px;
        }

        /* Inner Container - The actual flipping element */
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d; /* Maintains 3D positioning */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border-radius: 20px;
        }

        /* Flip on Hover */
        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }

        /* Front and Back Common Styles */
        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Safari */
            backface-visibility: hidden; /* Hides the back side */
            border-radius: 20px;
            overflow: hidden;
        }

        /* Front Side - Profile Image */
        .flip-card-front {
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Back Side - Profile Info */
        .flip-card-back {
            background: white;
            color: #333;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
        }

        /* Profile Image Circle on Back */
        .back-profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #2dd4bf; /* Teal color */
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(45, 212, 191, 0.3);
        }

        .back-profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .profile-title {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
            text-align: center;
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            gap: 15px;
        }

        .social-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2dd4bf; /* Teal color */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(45, 212, 191, 0.3);
        }

        .social-icon:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(45, 212, 191, 0.4);
            background: #14b8a6;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .flip-card {
                width: 300px;
                height: 450px;
            }
        }
    </style>
</head>
<body>

    <div class="flip-card">
        <div class="flip-card-inner">
            <!-- Front Side -->
            <div class="flip-card-front">
                <img src="mohsin.jpg" alt="Profile" class="profile-image">
            </div>
            
            <!-- Back Side -->
            <div class="flip-card-back">
                <div class="back-profile-img">
                    <img src="me1.jpeg" alt="Profile">
                </div>
                <h2 class="profile-name">Mohsin</h2>
                <p class="profile-title">Project Management and QA professional</p>
                
                <div class="social-icons">
                    <a href="#" class="social-icon" title="Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a href="#" class="social-icon" title="Twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="#" class="social-icon" title="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="#" class="social-icon" title="YouTube">
                        <i class="fab fa-youtube"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
