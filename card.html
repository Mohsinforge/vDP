<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Card Container */
        .card {
            background: white;
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden; /* Ensures corners stay round */
            text-align: center;
            position: relative;
        }

        /* Blue Header Background */
        .card-header {
            background-color: #4285F4;
            height: 140px;
            width: 100%;
        }

        /* Profile Image */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
            /* This pulls the image up to overlap the header */
            margin-top: -65px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Text Content */
        .card-body {
            padding: 10px 20px 30px 20px;
        }

        .name {
            font-size: 24px;
            font-weight: 500;
            color: #333;
            margin-top: 10px;
        }

        .role {
            font-size: 16px;
            color: #777;
            margin-bottom: 20px;
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-icons a {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            text-decoration: none;
            transition: transform 0.3s;
        }

        .social-icons a:hover {
            transform: translateY(-3px);
        }

        .facebook { background-color: #3b5998; }
        .twitter { background-color: #1da1f2; }
        .instagram { background-color: #e1306c; }
        .youtube { background-color: #ff0000; }

        /* Buttons */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 35px;
            border: none;
            border-radius: 25px;
            background-color: #4285F4;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #3367d6;
        }

        /* Stats Section */
        .stats {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #f0f0f0; /* Optional subtle separator */
            padding-top: 10px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-size: 16px;
        }

        .stat-item i {
            font-size: 18px;
        }

        /* Vertical Divider for stats */
        .divider {
            width: 1px;
            height: 20px;
            background-color: #ddd;
            margin: 0 15px;
        }

    </style>
</head>
<body>

    <div class="card">
        <!-- Blue Background Header -->
        <div class="card-header"></div>

        <!-- Profile Image (Overlaps Header) -->
        <!-- Using a placeholder image of a man with glasses -->
        <img src="albert-dera-ILip77SbmOE-unsplash.jpg" alt="Profile" class="profile-img">

        <div class="card-body">
            <h2 class="name">CodingLab</h2>
            <p class="role">YouTuber & Blogger</p>

            <!-- Social Media Icons -->
            <div class="social-icons">
                <a href="#" class="facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" class="instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" class="youtube"><i class="fab fa-youtube"></i></a>
            </div>

            <!-- Action Buttons -->
            <div class="buttons">
                <button class="btn">Subscribe</button>
                <button class="btn">Message</button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat-item">
                    <i class="far fa-heart"></i> 60k
                </div>
                <div class="divider"></div>
                <div class="stat-item">
                    <i class="far fa-comment"></i> 20k
                </div>
                <div class="divider"></div>
                <div class="stat-item">
                    <i class="fas fa-share"></i> 12k
                </div>
            </div>
        </div>
    </div>

</body>
</html>
