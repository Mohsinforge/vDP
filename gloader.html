<!DOCTYPE html>
<html>
<head>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f8f9fa;
    }

    .loader {
        display: flex;
        gap: 12px;
    }

    .dot {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) {
        background: #4285F4;
        animation-delay: -0.32s;
    }

    .dot:nth-child(2) {
        background: #EA4335;
        animation-delay: -0.16s;
    }

    .dot:nth-child(3) {
        background: #FBBC05;
        animation-delay: -0.08s;
    }

    .dot:nth-child(4) {
        background: #34A853;
    }

    @keyframes bounce {
        0%, 80%, 100% {
            transform: scale(0);
        }
        40% {
            transform: scale(1);
        }
    }
</style>
</head>
<body>

    <div class="loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

</body>
</html>
