<!DOCTYPE html>
<html>
<head>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #e3f2fd;
        font-family: 'Arial', sans-serif;
    }

    .credit-card {
        width: 450px;
        height: 280px;
        background: #0d0d0d;
        border-radius: 20px;
        padding: 35px;
        color: white;
        position: relative;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    /* Wavy background pattern */
    .credit-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: repeating-linear-gradient(
            90deg,
            transparent,
            transparent 15px,
            rgba(255, 255, 255, 0.02) 15px,
            rgba(255, 255, 255, 0.02) 30px
        );
        pointer-events: none;
    }

    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 50px;
        position: relative;
        z-index: 1;
    }

    /* Mastercard logo */
    .mastercard {
        display: flex;
        align-items: center;
    }

    .circle {
        width: 45px;
        height: 45px;
        border-radius: 50%;
    }

    .circle.red {
        background: #eb001b;
        margin-right: -18px;
    }

    .circle.orange {
        background: #f79e1b;
    }

    .card-brand {
        font-size: 22px;
        font-weight: 500;
        margin-left: 12px;
        letter-spacing: 0.5px;
    }

    /* Chip design */
    .chip {
        width: 65px;
        height: 50px;
        background: linear-gradient(135deg, #d4af37 0%, #f4e5c2 50%, #d4af37 100%);
        border-radius: 10px;
        position: relative;
        overflow: hidden;
    }

    .chip::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: #b8941f;
        transform: translateY(-50%);
    }

    .chip::after {
        content: '';
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 1px;
        background: #b8941f;
        transform: translateX(-50%);
    }

    .label {
        font-size: 14px;
        opacity: 0.8;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
    }

    .card-number {
        font-size: 30px;
        letter-spacing: 2px;
        margin-bottom: 35px;
        font-weight: 400;
        position: relative;
        z-index: 1;
    }

    .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        position: relative;
        z-index: 1;
    }

    .cardholder {
        font-size: 20px;
        letter-spacing: 0.5px;
        font-weight: 400;
    }

    .valid-thru {
        text-align: right;
    }

    .valid-label {
        font-size: 14px;
        opacity: 0.8;
        margin-bottom: 5px;
        letter-spacing: 0.5px;
    }

    .valid-date {
        font-size: 20px;
        letter-spacing: 1px;
    }
</style>
</head>
<body>

    <div class="credit-card">
        <div class="card-header">
            <div class="mastercard">
                <div class="circle red"></div>
                <div class="circle orange"></div>
                <span class="card-brand">Master Card</span>
            </div>
            <div class="chip"></div>
        </div>

        <div class="label">Card Number</div>
        <div class="card-number">1111 2222 3333 4444</div>

        <div class="card-footer">
            <div class="cardholder">Mohsin Shahzad</div>
            <div class="valid-thru">
                <div class="valid-label">Valid Thru</div>
                <div class="valid-date">05/28</div>
            </div>
        </div>
    </div>

</body>
</html>
